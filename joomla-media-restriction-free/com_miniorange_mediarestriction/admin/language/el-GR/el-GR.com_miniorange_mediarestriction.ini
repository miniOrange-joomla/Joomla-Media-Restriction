COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP1="Κάντε κλικ στο κουμπί <strong><em>Αγορά τώρα</em></strong> για την απαιτούμενη έκδοση άδειας χρήσης και θα ανακατευθυνθείτε στην κονσόλα σύνδεσης miniOrange."
COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP2="Εισαγάγετε τα διαπιστευτήρια του λογαριασμού σας στο miniOrange. Μόλις συνδεθείτε με επιτυχία, θα ανακατευθυνθείτε στη σελίδα πληρωμής."
COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP3="Εισαγάγετε τα στοιχεία της κάρτας σας και προχωρήστε στην πληρωμή. Με την επιτυχή ολοκλήρωση της πληρωμής, η προσθήκη έκδοσης άδειας χρήσης θα είναι διαθέσιμη για λήψη."
COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP4="Μπορείτε να κάνετε λήψη της προσθήκης έκδοσης άδειας χρήσης από την ενότητα <strong><em> Λήψεις </em></strong> στην κονσόλα miniOrange. Αντιγράψτε το κλειδί άδειας χρήσης από το <strong><em> Διαχείριση άδειας > Κλειδιά άδειας χρήσης </em></strong>."
COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP5="Από τον πίνακα ελέγχου διαχειριστή του Joomla απεγκαταστήστε τη δωρεάν προσθήκη που είναι εγκατεστημένη αυτήν τη στιγμή."
COM_MINIORANGE_MEDIARESTRICTION_UPGRADE_STEP6="Τώρα εγκαταστήστε την προσθήκη έκδοσης άδειας χρήσης που έχετε λάβει. Αφού εγκαταστήσετε την προσθήκη της έκδοσης άδειας χρήσης, συνδεθείτε χρησιμοποιώντας το λογαριασμό που χρησιμοποιήσατε για την αγορά της προσθήκης έκδοσης άδειας χρήσης.<br> <br>"
COM_MINIORANGE_MEDIARESTRICTION_RETURN_POLICY="Πολιτική επιστροφών -"
COM_MINIORANGE_MEDIARESTRICTION_RETURN_POLICY_TEXT="Στη miniOrange θέλουμε να διασφαλίσουμε ότι είστε 100% ευχαριστημένοι με την αγορά σας. Εάν η άδεια προσθήκης που αγοράσατε δεν λειτουργεί όπως διαφημίζεται και έχετε προσπαθήσει να επιλύσετε τυχόν προβλήματα λειτουργιών με την ομάδα υποστήριξής μας, αλλά δεν μπορέσατε να τα επιλύσετε, θα επιστρέψουμε το ποσό της προσθήκης εντός 10 ημερών από την αγορά. Λάβετε υπόψη ότι δεν θα επιστρέψουμε τυχόν χρεώσεις που καταβλήθηκαν για ώρες υποστήριξης σχεδίων υποστήριξης ή χρεώσεις προσαρμογής."
