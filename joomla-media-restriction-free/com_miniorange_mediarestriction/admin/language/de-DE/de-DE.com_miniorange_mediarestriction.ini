COM_MINIORANGE_MEDIARESTRICTION_RETURN_POLICY_TEXT="Bei miniOrange möchten wir sicherstellen, dass Sie mit Ihrem Kauf 100 % zufrieden sind. Wenn das von Ihnen erworbene lizenzierte Plugin nicht wie beworben funktioniert und Sie versucht haben, Funktionsprobleme mit unserem Support-Team zu lösen, diese aber nicht lösen konnten, erstatten wir Ihnen den Plugin-Betrag innerhalb von 10 Tagen nach dem Kauf zurück. Bitte beachten Sie, dass wir keine Gebühren für Supportstunden oder Anpassungsgebühren von Supportplänen erstatten."
COM_MINIORANGE_MEDIARESTRICTION_RETURN_POLICY_TEXT1="Beachten Sie, dass diese Richtlinie die folgenden Fälle nicht abdeckt:"
